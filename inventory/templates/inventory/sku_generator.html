{% extends "inventory/base.html" %}
{% load static %}

{% block additional_head %}
<script src="{% static 'scripts/sku_generator.js' %}"></script>
{% endblock %}

{% block page_title %}CCP SKU Generator{% endblock %}

{% block content %}

    <div class="pb-2 mt-4 mb-2 border-bottom">
        <h1>SKU Generator</h1>
        <small class="text-muted">Generate SKUs for products or ranges</small>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text">Variation SKU</span>
                    </div>
                    <input type="text" id="variation_sku" name="variation_sku" class="form-control">
                    <div class="input-group-append">
                        <button id="get_variation_sku" class="btn btn-primary" type="button">
                            Generate
                        </button>
                    </div>
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text">Range SKU</span>
                    </div>
                    <input type="text" id="range_sku" name="range_sku" class="form-control">
                    <div class="input-group-append">
                        <button id="get_range_sku" class="btn btn-primary" type="button">
                            Generate
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}

{% block script %}
    <script>
        var new_sku_url = "{% url 'inventory:get_new_sku' %}";
        var new_range_sku_url = "{% url 'inventory:get_new_range_sku' %}";
    </script>
{% endblock %}
